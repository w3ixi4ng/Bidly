_format_version: "3.0"
_transform: true

services:
  - name: tasks-service
    url: http://tasks:8005
    routes:
      - name: tasks-route
        paths:
          - /tasks
        strip_path: false

  - name: chats-service
    url: http://chats:8006
    routes:
      - name: chats-route
        paths:
          - /chats
        strip_path: false

  - name: chat-logs-service
    url: http://chat-logs:8002
    routes:
      - name: chat-logs-route
        paths:
          - /chat-logs
        strip_path: false

  - name: bids-service
    url: http://bids:8003
    routes:
      - name: bids-route
        paths:
          - /bids
        strip_path: false

  - name: users-service
    url: http://users:8004
    routes:
      - name: users-route
        paths:
          - /users
        strip_path: false

  - name: create-task-service
    url: http://create-task:8009
    routes:
      - name: create-task-route
        paths:
          - /create-task
        strip_path: false
          
  - name: connect-chat-service
    url: http://connect-chat:8010
    routes:
      - name: connect-chat-route
        paths:
          - /connect-chat
        strip_path: false
        
  - name: handle-payment-service
    url: http://handle-payment:8012
    routes:
      - name: handle-payment-route
        paths:
          - /handle-payment
        strip_path: false

  - name: payment-service
    url: http://payment:8011
    routes:
      - name: payment-route
        paths:
          - /payment
        strip_path: false

  - name: websocket-service
    url: http://websocket:8007
    routes:
      - name: websocket-route
        paths:
          - /socket.io
        strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      exposed_headers:
        - Authorization
      credentials: false
      max_age: 3600