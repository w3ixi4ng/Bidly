name: Validate PR

on:
  pull_request:
    branches: [main, dev]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    outputs:
      users: ${{ steps.changes.outputs.users }}
      tasks: ${{ steps.changes.outputs.tasks }}
      bids: ${{ steps.changes.outputs.bids }}
      chats: ${{ steps.changes.outputs.chats }}
      chat-logs: ${{ steps.changes.outputs.chat-logs }}
      notifications: ${{ steps.changes.outputs.notifications }}
      payment: ${{ steps.changes.outputs.payment }}
      websocket: ${{ steps.changes.outputs.websocket }}
      create-task: ${{ steps.changes.outputs.create-task }}
      connect-chat: ${{ steps.changes.outputs.connect-chat }}
      handle-payment: ${{ steps.changes.outputs.handle-payment }}
      process-winner: ${{ steps.changes.outputs.process-winner }}
      send-notifications: ${{ steps.changes.outputs.send-notifications }}
      start-auction: ${{ steps.changes.outputs.start-auction }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Detect changed services
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            users: backend/services/users/**
            tasks: backend/services/tasks/**
            bids: backend/services/bids/**
            chats: backend/services/chats/**
            chat-logs: backend/services/chat-logs/**
            notifications: backend/services/notifications/**
            payment: backend/services/payment/**
            websocket: backend/websocket/**
            create-task: backend/orchestrators/create-task/**
            connect-chat: backend/orchestrators/connect-chat/**
            handle-payment: backend/orchestrators/handle-payment/**
            process-winner: backend/orchestrators/process-winner/**
            send-notifications: backend/orchestrators/send-notifications/**
            start-auction: backend/orchestrators/start-auction/**

  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Semgrep scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >
            p/python
            p/javascript

  trivy:
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      matrix:
        include:
          - service: users
            context: backend/services/users
            changed: ${{ needs.detect-changes.outputs.users }}
          - service: tasks
            context: backend/services/tasks
            changed: ${{ needs.detect-changes.outputs.tasks }}
          - service: bids
            context: backend/services/bids
            changed: ${{ needs.detect-changes.outputs.bids }}
          - service: chats
            context: backend/services/chats
            changed: ${{ needs.detect-changes.outputs.chats }}
          - service: chat-logs
            context: backend/services/chat-logs
            changed: ${{ needs.detect-changes.outputs.chat-logs }}
          - service: notifications
            context: backend/services/notifications
            changed: ${{ needs.detect-changes.outputs.notifications }}
          - service: payment
            context: backend/services/payment
            changed: ${{ needs.detect-changes.outputs.payment }}
          - service: websocket
            context: backend/websocket
            changed: ${{ needs.detect-changes.outputs.websocket }}
          - service: create-task
            context: backend/orchestrators/create-task
            changed: ${{ needs.detect-changes.outputs.create-task }}
          - service: connect-chat
            context: backend/orchestrators/connect-chat
            changed: ${{ needs.detect-changes.outputs.connect-chat }}
          - service: handle-payment
            context: backend/orchestrators/handle-payment
            changed: ${{ needs.detect-changes.outputs.handle-payment }}
          - service: process-winner
            context: backend/orchestrators/process-winner
            changed: ${{ needs.detect-changes.outputs.process-winner }}
          - service: send-notifications
            context: backend/orchestrators/send-notifications
            changed: ${{ needs.detect-changes.outputs.send-notifications }}
          - service: start-auction
            context: backend/orchestrators/start-auction
            changed: ${{ needs.detect-changes.outputs.start-auction }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Skip if unchanged
        if: matrix.changed != 'true'
        run: echo "No changes in ${{ matrix.service }}, skipping."

      - name: Build image
        if: matrix.changed == 'true'
        run: |
          docker build -t bidly/${{ matrix.service }}:${{ github.sha }} ${{ matrix.context }}

      - name: Trivy scan
        if: matrix.changed == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: bidly/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
