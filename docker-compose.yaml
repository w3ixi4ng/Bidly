# volumes:

networks:
  bidly-net:
    driver: bridge
    name: bidly-net

services:
  tasks:
    build: ./backend/services/tasks
    container_name: tasks
    ports:
      - "8000:8000"
    networks:
      - bidly-net
    env_file:
      - .env.supabase

  chats:
    build: ./backend/services/chats
    container_name: chats
    ports:
      - "8001:8001"
    networks:
      - bidly-net
    env_file:
      - .env.supabase

  chat-logs:
    build: ./backend/services/chat-logs
    container_name: chat-logs
    ports:
      - "8002:8002"
    networks:
      - bidly-net
    env_file:
      - .env.firebase

  bids:
    build: ./backend/services/bids
    container_name: bids
    ports:
      - "8003:8003"
    networks:
      - bidly-net
    env_file:
      - .env.supabase
      - .env.redis

  users:
    build: ./backend/services/users
    container_name: users
    ports:
      - "8004:8004"
    networks:
      - bidly-net
    env_file:
      - .env.supabase