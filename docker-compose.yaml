volumes:
  rabbitmq_data:
    name: rabbitmq_data
  redis_data:
    name: redis_data

networks:
  bidly-net:
    driver: bridge
    name: bidly-net

services:
  tasks:
    image: bidly/tasks:latest
    build: ./backend/services/tasks
    container_name: tasks
    ports:
      - "8005:8005"
    networks:
      - bidly-net
    env_file:
      - .env.supabase

  chats:
    image: bidly/chats:latest
    build: ./backend/services/chats
    container_name: chats
    ports:
      - "8006:8006"
    networks:
      - bidly-net
    env_file:
      - .env.supabase

  chat-logs:
    image: bidly/chat-logs:latest
    build: ./backend/services/chat-logs
    container_name: chat-logs
    ports:
      - "8002:8002"
    networks:
      - bidly-net
    env_file:
      - .env.firebase

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    networks:
      - bidly-net
    volumes:
      - redis_data:/data
    command:
      - redis-server
      - --appendonly yes
      - --appendfilename "redis_data.aof"
      - --dir /data

  bids:
    image: bidly/bids:latest
    build: ./backend/services/bids
    container_name: bids
    ports:
      - "8003:8003"
    networks:
      - bidly-net
    env_file:
      - .env.supabase
    depends_on:
      rabbitmq:
        condition: service_healthy # ensure RabbitMQ is up and healthy before starting bids service
      rabbitmq-setup:
        condition: service_completed_successfully # ensure RabbitMQ setup is complete before starting bids service
      redis:
        condition: service_started 
        
  users:
    image: bidly/users:latest
    build: ./backend/services/users
    container_name: users
    ports:
      - "8004:8004"
    networks:
      - bidly-net
    env_file:
      - .env.supabase

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # management UI
    networks:
      - bidly-net
    healthcheck: # ensure RabbitMQ is healthy before other services start
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"] 
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  rabbitmq-setup:
    image: bidly/rabbitmq-setup:latest
    build: ./backend/rabbitmq
    container_name: rabbitmq-setup
    restart: on-failure
    depends_on:
      rabbitmq:
        condition: service_healthy # ensure RabbitMQ is up and healthy before starting setup
    networks:
      - bidly-net

  start-auction:
    image: bidly/start-auction:latest
    build: ./backend/orchestrators/start-auction
    container_name: start-auction
    restart: on-failure
    networks:
      - bidly-net
    depends_on:
      rabbitmq:
        condition: service_healthy # ensure RabbitMQ is up and healthy before starting setup
      rabbitmq-setup:
        condition: service_completed_successfully # service exits with code 0

  process-winner:
    image: bidly/process-winner:latest
    build: ./backend/orchestrators/process-winner
    container_name: process-winner
    restart: on-failure
    networks:
      - bidly-net
    depends_on:
      rabbitmq:
        condition: service_healthy
      rabbitmq-setup:
        condition: service_completed_successfully

  connect-chat:
    image: bidly/connect-chat:latest
    build: ./backend/orchestrators/connect-chat
    container_name: connect-chat
    restart: on-failure
    ports:
      - "8010:8010"
    networks:
      - bidly-net
    depends_on:
      rabbitmq:
        condition: service_healthy
      rabbitmq-setup:
        condition: service_completed_successfully

  handle-payment:
    image: bidly/handle-payment:latest
    build: ./backend/orchestrators/handle-payment
    container_name: handle-payment
    restart: on-failure
    ports:
      - "8012:8012"
    networks:
      - bidly-net
    env_file:
      - .env.stripe

  websocket:
    image: bidly/websocket:latest
    build: ./backend/websocket
    container_name: websocket
    ports:
      - "8007:8007"
    networks:
      - bidly-net
    depends_on:
      rabbitmq:
        condition: service_healthy

  create-task:
    image: bidly/create-task:latest
    build: ./backend/orchestrators/create-task
    container_name: create-task
    ports:
      - "8009:8009"
    networks:
      - bidly-net
    depends_on:
      rabbitmq:
        condition: service_healthy
      rabbitmq-setup:
        condition: service_completed_successfully
      tasks:
        condition: service_started

  payment:
    image: bidly/payment:latest
    build: ./backend/services/payment
    container_name: payment
    ports:
      - "8011:8011"
    networks:
      - bidly-net
    env_file:
      - .env.stripe
    depends_on:
      rabbitmq:
        condition: service_healthy
      rabbitmq-setup:
        condition: service_completed_successfully
      connect-chat:
        condition: service_started 
  notifications:
    image: bidly/notifications:latest
    build: ./backend/services/notifications
    container_name: notifications
    ports:
      - "8008:8008"
    networks:
      - bidly-net
  send-notifications:
    image: bidly/send-notifications:latest
    build: ./backend/orchestrators/send-notifications
    container_name: send-notification
    networks:
      - bidly-net
    depends_on:
      rabbitmq:
        condition: service_healthy
      rabbitmq-setup:
        condition: service_completed_successfully
      notifications:
        condition: service_started

  photos:
    image: bidly/photos:latest
    build: ./backend/services/photos
    container_name: photos
    ports:
      - "8050:8050"
    networks:
      - bidly-net
    env_file:
      - .env.supabase

  upload-photo:
    image: bidly/upload-photo:latest
    build: ./backend/orchestrators/upload-photo
    container_name: upload-photo
    ports:
      - "8051:8051"
    networks:
      - bidly-net
    depends_on:
      photos:
        condition: service_started
      users:
        condition: service_started
      tasks:
        condition: service_started

  kong:
    image: kong:3.6
    container_name: kong
    restart: always
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yaml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ./backend/kong/kong.yaml:/etc/kong/kong.yaml:ro
    ports:
      - "8000:8000"     # proxy (all client traffic goes here)
      - "8001:8001"   # admin API
      - "8443:8443"   # proxy SSL (if needed)
    networks:
      - bidly-net
    depends_on:
      - tasks
      - chats
      - chat-logs
      - bids
      - users
      - connect-chat
      - upload-photo
