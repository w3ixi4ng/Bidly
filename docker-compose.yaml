volumes:
  rabbitmq_data:
    name: rabbitmq_data
  
networks:
  bidly-net:
    driver: bridge
    name: bidly-net

services:
  tasks:
    build: ./backend/services/tasks
    container_name: tasks
    ports:
      - "8005:8005"
    networks:
      - bidly-net
    env_file:
      - .env.supabase

  chats:
    build: ./backend/services/chats
    container_name: chats
    ports:
      - "8006:8006"
    networks:
      - bidly-net
    env_file:
      - .env.supabase

  chat-logs:
    build: ./backend/services/chat-logs
    container_name: chat-logs
    ports:
      - "8002:8002"
    networks:
      - bidly-net
    env_file:
      - .env.firebase

  bids:
    build: ./backend/services/bids
    container_name: bids
    ports:
      - "8003:8003"
    networks:
      - bidly-net
    env_file:
      - .env.supabase
      - .env.redis

  users:
    build: ./backend/services/users
    container_name: users
    ports:
      - "8004:8004"
    networks:
      - bidly-net
    env_file:
      - .env.supabase

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # management UI
    networks:
      - bidly-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq-setup:
    build: ./backend/rabbitmq
    container_name: rabbitmq-setup
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - bidly-net

  kong:
    image: kong:3.6
    container_name: kong
    restart: always
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yaml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ./backend/kong/kong.yaml:/etc/kong/kong.yaml:ro
    ports:
      - "8000:8000"     # proxy (all client traffic goes here)
      - "8001:8001"   # admin API
      - "8443:8443"   # proxy SSL (if needed)
    networks:
      - bidly-net
    depends_on:
      - tasks
      - chats
      - chat-logs
      - bids
      - users