apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bidly
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/w3ixi4ng/Bidly
    targetRevision: main
    path: k8s
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: bidly
  syncPolicy:
    automated:
      prune: true      # deletes resources removed from git
      selfHeal: true   # reverts manual changes made outside git