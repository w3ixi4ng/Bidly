apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bidly-ingress
  namespace: bidly
  annotations:
    kubernetes.io/ingress.class: "gce"
    # SSL termination — uncomment when domain is ready:
    # networking.gke.io/managed-certificates: bidly-cert
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kong
                port:
                  number: 8000
