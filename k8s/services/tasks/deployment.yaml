apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasks
  namespace: bidly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tasks
  template:
    metadata:
      labels:
        app: tasks
    spec:
      containers:
        - name: tasks
          image: asia-southeast1-docker.pkg.dev/project-0ccd7e90-483b-4e7d-904/bidly/tasks:latest
          ports:
            - containerPort: 8005
          envFrom:
            - secretRef:
                name: supabase-secret
