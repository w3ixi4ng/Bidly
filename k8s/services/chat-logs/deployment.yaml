apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-logs
  namespace: bidly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-logs
  template:
    metadata:
      labels:
        app: chat-logs
    spec:
      containers:
        - name: chat-logs
          image: asia-southeast1-docker.pkg.dev/project-0ccd7e90-483b-4e7d-904/bidly/chat-logs:ac8150f8374c9db5f117e5b1d9b7df06fbc90b65
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
          envFrom:
            - secretRef:
                name: firebase-secret
