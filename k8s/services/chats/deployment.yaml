apiVersion: apps/v1
kind: Deployment
metadata:
  name: chats
  namespace: bidly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chats
  template:
    metadata:
      labels:
        app: chats
    spec:
      containers:
        - name: chats
          image: asia-southeast1-docker.pkg.dev/project-0ccd7e90-483b-4e7d-904/bidly/chats:f4ccebd50d261a89282413805c1f9858eca3851f
          imagePullPolicy: Always
          ports:
            - containerPort: 8006
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
          envFrom:
            - secretRef:
                name: supabase-secret
