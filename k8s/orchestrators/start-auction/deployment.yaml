apiVersion: apps/v1
kind: Deployment
metadata:
  name: start-auction
  namespace: bidly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: start-auction
  template:
    metadata:
      labels:
        app: start-auction
    spec:
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox
          command: ["sh", "-c", "until nc -z rabbitmq 5672; do echo waiting for rabbitmq; sleep 5; done; echo rabbitmq port open, sleeping 20s for readiness; sleep 20"]
      containers:
        - name: start-auction
          image: asia-southeast1-docker.pkg.dev/project-0ccd7e90-483b-4e7d-904/bidly/start-auction:2537e5841bc50a274b8b858ec610628ccb86bc9d
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
          # Pure RabbitMQ consumer — no HTTP port, no Service needed
          # Connects outbound to rabbitmq:5672 and redis:6379
