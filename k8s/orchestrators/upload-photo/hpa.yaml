apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: upload-photo
  namespace: bidly
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: upload-photo
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
