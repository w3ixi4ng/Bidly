apiVersion: apps/v1
kind: Deployment
metadata:
  name: upload-photo
  namespace: bidly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: upload-photo
  template:
    metadata:
      labels:
        app: upload-photo
    spec:
      containers:
        - name: upload-photo
          image: asia-southeast1-docker.pkg.dev/project-0ccd7e90-483b-4e7d-904/bidly/upload-photo:ac8150f8374c9db5f117e5b1d9b7df06fbc90b65
          imagePullPolicy: Always
          ports:
            - containerPort: 8051
          resources:
            requests:
              cpu: 50m
              memory: 128Mi


