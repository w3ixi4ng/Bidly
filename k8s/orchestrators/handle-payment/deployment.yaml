apiVersion: apps/v1
kind: Deployment
metadata:
  name: handle-payment
  namespace: bidly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: handle-payment
  template:
    metadata:
      labels:
        app: handle-payment
    spec:
      containers:
        - name: handle-payment
          image: asia-southeast1-docker.pkg.dev/project-0ccd7e90-483b-4e7d-904/bidly/handle-payment:c58c77d6c558d6909f31d74fa8bea1efd973d479
          imagePullPolicy: Always
          ports:
            - containerPort: 8012
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
          envFrom:
            - secretRef:
                name: stripe-secret
