apiVersion: apps/v1
kind: Deployment
metadata:
  name: process-winner
  namespace: bidly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: process-winner
  template:
    metadata:
      labels:
        app: process-winner
    spec:
      initContainers:
        - name: wait-for-rabbitmq
          image: busybox
          command: ["sh", "-c", "until nc -z rabbitmq 5672; do echo waiting for rabbitmq; sleep 5; done; echo rabbitmq port open, sleeping 20s for readiness; sleep 20"]
      containers:
        - name: process-winner
          image: asia-southeast1-docker.pkg.dev/project-0ccd7e90-483b-4e7d-904/bidly/process-winner:ac8150f8374c9db5f117e5b1d9b7df06fbc90b65
          imagePullPolicy: Always
          # Pure RabbitMQ consumer — no HTTP port, no Service needed
          # Consumes from Process_Winner queue (dead-lettered from auction_in_progress)
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
          envFrom:
            - secretRef:
                name: supabase-secret
